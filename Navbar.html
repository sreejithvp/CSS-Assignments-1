<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Navbar 2</title>
</head>

<body class="bg-gray-500">
    <div class="px-10">
        <nav class="w-full h-20  bg-black mt-10 justify-between flex items-center px-10">
            <div class="flex items-center "><img
                    src="https://cdn.icon-icons.com/icons2/2699/PNG/512/tailwindcss_logo_icon_167923.png" alt=""
                    width="40">
                <h1 class="text-white flex justify text-2xl">tailwindcss</h1>
            </div>
            <div class="flex items-center gap-6">
                <ul class="gap-6 text-2xl hidden md:flex">
                    <li class="cursor-pointer text-white hover:text-teal-300 hover:underline">Docs</li>
                    <li class="cursor-pointer text-white hover:text-teal-300 hover:underline">Components</li>
                    <li class="cursor-pointer text-white hover:text-teal-300 hover:underline">Blog</li>
                    <li class="cursor-pointer text-white hover:text-teal-300 hover:underline">Showcase</li>
                    <li style="color:#615b5b">|</li>
                    <button><i class="fa-regular fa-moon" style="color: #615b5b;"></i></button>
                    <button><i class="fa-brands fa-github" style="color: #a29d9d;"></i></button>
                </ul>
            </div>
        </nav>
    </div>

    <div class="px-10">
        <nav class="w-full h-20 bg-white mt-10 justify-between flex items-center px-10">
            <div class="flex items-center "><img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Ikea-logo.png"
                    alt="" width="100">
                <form action="#"
                    class="border w-[800px] flex gap-6 items-center px-6 ml-10 h-12 bg-gray-200 rounded-full">
                    <i class="fa-solid fa-magnifying-glass" style="color: #000000;"></i>
                    <input type="text" class="w-full border-none bg-gray-200  outline-none"
                        placeholder="What are you Looking for ?">
                    <i class="fa-solid fa-camera" style="color: #000000;"></i>
                </form>
            </div>
            <div class="flex items-center gap-6">
                <ul class="gap-6 text-2xl hidden md:flex">
                    <li class="cursor-pointer text-black hover:text-blue-700 hover:underline"> <i
                            class="fa-solid fa-truck" style="color: #000000;"></i> Enter Postal Code</li>
                    <li class="cursor-pointer text-black hover:text-blue-700 hover:underline"> <i
                            class="fa-solid fa-store" style="color: #000000;"></i> Select Store</li>
                    <li class="cursor-pointer text-black hover:text-blue-700 hover:underline"> <i
                            class="fa-solid fa-user" style="color: #000000;"></i>Hey! Login or Signup</li>
                    <button><i class="fa-regular fa-heart" style="color: #000000;"></i></button>
                    <button><i class="fa-solid fa-bag-shopping" style="color: #000000;"></i></button>
                </ul>
            </div>
        </nav>
    </div>

    <div class="px-10">
        <nav class="w-full h-20 bg-white mt-10 justify-between flex items-center px-8">
            <div class="flex items-center gap-24">
               <div class="flex">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Nykaa_New_Logo.svg/1200px-Nykaa_New_Logo.svg.png"
                alt="" width="100">
            <ul class="gap-6 text-2xl hidden md:flex">
                <li class="cursor-pointer text-black hover:text-pink-600 hover:underline">Categories <i
                        class="fa-solid fa-caret-down" style="color: #857878;"></i></li>
                <li class="cursor-pointer text-black hover:text-pink-600 hover:underline">Brands <i
                        class="fa-solid fa-caret-down" style="color: #857878;"></i></li>
                </li>
                <li class="cursor-pointer text-black hover:text-pink-600 hover:underline">Luxe</li>
                <li class="cursor-pointer text-black hover:text-pink-600 hover:underline">Nykaa Fashion</li>
                <li class="cursor-pointer text-black hover:text-pink-600 hover:underline">Beauty Advice</li>
            </ul>
               </div>
       <div class="flex h-full items-center gap-6 lg:ml-24">
        <form action="#"
        class="border w-[600px] flex gap-6 items-center px-6 ml-10 h-12 bg-gray-100 rounded-lg">
        <i class="fa-solid fa-magnifying-glass" style="color: #857f7f;"></i>
        <input type="text" class="w-full border-none bg-gray-100  outline-none"
            placeholder="Search on Nykaa">
    </form>
    <button class="text-white text-xl bg-pink-500 rounded-md h-10 w-24"> Sign in </button>
    <i class="fa-solid fa-bag-shopping fa-xl" style="color: #000000;"></i>
       </div>
            </div>

        </nav>
    </div>
</body>

</html>
